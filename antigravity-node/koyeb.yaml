name: yedan-antigravity-n3

service:
  name: antigravity-proxy
  type: web

  definition:
    docker:
      dockerfile: Dockerfile

    instance_types:
      - type: free

    regions:
      - fra

    ports:
      - port: 8080
        protocol: http

    routes:
      - path: /
        port: 8080

    env:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: "production"

    health_checks:
      - type: http
        port: 8080
        path: /health
        interval_seconds: 30
        timeout_seconds: 5
        healthy_threshold: 2
        unhealthy_threshold: 3
        grace_period: 30

    scaling:
      min: 1
      max: 1
