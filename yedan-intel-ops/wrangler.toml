name = "yedan-intel-ops"
main = "worker.js"
compatibility_date = "2024-12-01"

[vars]
BUNSHIN_URL = "https://openclaw-mcp-servers.onrender.com"

# OODA OBSERVE — Intel sweep every 3 minutes (overclocked)
[triggers]
crons = ["*/3 * * * *"]

[[kv_namespaces]]
binding = "KV"
id = "412eb1678043499eb34f0e7f211176b9"

[[kv_namespaces]]
binding = "ARMY_KV"
id = "51826cd6550a40e79a61d462b084a1c8"

[[d1_databases]]
binding = "ARMY_DB"
database_name = "yedan-army-command"
database_id = "48fa9025-84ba-448a-9993-1d88e37f0a5c"

# Service Bindings (Worker-to-Worker, zero HTTP overhead)
[[services]]
binding = "GRAPH_RAG"
service = "yedan-graph-rag"

[[services]]
binding = "FLEET_GATEWAY"
service = "fleet-gateway"

[[services]]
binding = "CORTEX"
service = "openclaw-do"

# Browser Rendering (edge headless Chrome for web intelligence)
browser = { binding = "BROWSER" }
