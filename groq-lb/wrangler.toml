name = "groq-lb"
main = "worker.js"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# KV Namespace — stores per-key usage state and round-robin index
# ---------------------------------------------------------------------------
# Create the namespace first:
#   wrangler kv:namespace create GROQ_STATE
# Then paste the returned id below.
[[kv_namespaces]]
binding = "GROQ_STATE"
id = "dd7bda024a7a466d8136ab43e6bec377"

# ---------------------------------------------------------------------------
# Secrets (set via wrangler secret put)
# ---------------------------------------------------------------------------
# wrangler secret put GROQ_KEY_1
# wrangler secret put GROQ_KEY_2
# wrangler secret put GROQ_KEY_3
# wrangler secret put GROQ_KEY_4
# wrangler secret put LB_AUTH_TOKEN

# ---------------------------------------------------------------------------
# Optional: custom route / domain
# ---------------------------------------------------------------------------
# [[routes]]
# pattern = "groq-lb.yourdomain.com/*"
# zone_name = "yourdomain.com"
