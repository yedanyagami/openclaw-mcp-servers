name = "github-models-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

[vars]
VERSION = "1.0.0"
# Available models (tested working 2026-03-20):
# gpt-4o, gpt-4o-mini, DeepSeek-R1, Llama-3.3-70B-Instruct, Phi-4, Phi-4-multimodal-instruct
DEFAULT_MODEL = "DeepSeek-R1"

# Secret (via wrangler secret put):
#   GITHUB_TOKEN — gh auth token
#   AUTH_TOKEN — fleet auth for this worker

[[kv_namespaces]]
binding = "KV"
id = "59f9508dcc454f338c9d662b3d7b6326"

[placement]
mode = "smart"

[observability]
enabled = true
