name = "openclaw-tools"
main = "worker.js"
compatibility_date = "2024-12-01"

[vars]
VERSION = "1.0.0"

# Workers AI via AI Gateway
[ai]
binding = "AI"
gateway = { id = "openclaw-ai-gateway" }

# D1 database (shared)
[[d1_databases]]
binding = "DB"
database_name = "yedan-army-command"
database_id = "48fa9025-84ba-448a-9993-1d88e37f0a5c"

# KV for caching
[[kv_namespaces]]
binding = "KV"
id = "51826cd6550a40e79a61d462b084a1c8"
