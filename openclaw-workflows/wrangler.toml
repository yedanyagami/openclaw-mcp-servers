name = "openclaw-workflows"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Workflow bindings (6 workflows)
[[workflows]]
name = "evolution-workflow"
binding = "EVOLUTION"
class_name = "EvolutionWorkflow"

[[workflows]]
name = "deploy-workflow"
binding = "DEPLOY"
class_name = "DeployWorkflow"

[[workflows]]
name = "research-workflow"
binding = "RESEARCH"
class_name = "ResearchWorkflow"

[[workflows]]
name = "security-audit-workflow"
binding = "SECURITY_AUDIT"
class_name = "SecurityAuditWorkflow"

[[workflows]]
name = "skill-evolution-workflow"
binding = "SKILL_EVOLUTION"
class_name = "SkillEvolutionWorkflow"

[[workflows]]
name = "ab-test-workflow"
binding = "AB_TEST"
class_name = "ABTestWorkflow"

# Workers AI via AI Gateway
[ai]
binding = "AI"
gateway = { id = "default" }

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "yedan-army-command"
database_id = "48fa9025-84ba-448a-9993-1d88e37f0a5c"

# KV for reading VM metrics (skill-evolution needs this)
[[kv_namespaces]]
binding = "KV"
id = "51826cd6550a40e79a61d462b084a1c8"

# Service Bindings
[[services]]
binding = "FLEET_GATEWAY"
service = "fleet-gateway"

[[services]]
binding = "GRAPH_RAG"
service = "yedan-graph-rag"

[[services]]
binding = "CLOUD_EXECUTOR"
service = "yedan-cloud-executor"

# Queue for async tasks
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "openclaw-task-queue"
