name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'json-toolkit-mcp/**'
      - 'regex-engine-mcp/**'
      - 'color-palette-mcp/**'
      - 'timestamp-converter-mcp/**'
      - 'prompt-enhancer-mcp/**'
      - 'agentforge-compare-mcp/**'
      - 'moltbook-publisher-mcp/**'
      - 'fortune-mcp/**'
      - 'fortune-api/**'
      - 'openclaw-intel-mcp/**'
      - 'openclaw-intel-api/**'
      - 'product-store/**'
      - 'fleet-gateway/**'
      - 'zilliz-bridge/**'
      - 'yedan-graph-rag/**'
      - 'github-models-proxy/**'
      - 'xai-proxy/**'
      - 'yedan-orchestrator/**'
      - 'yedan-cloud-executor/**'
      - 'yedan-intel-ops/**'
      - 'yedan-health-commander/**'
      - 'yedan-content-engine/**'
      - 'yedan-revenue-sentinel/**'
      - 'openclaw-do/**'
      - 'openclaw-workflows/**'
      - 'openclaw-browser/**'
      - 'antigravity-lb/**'
      - 'groq-lb/**'
      - 'google-policy-monitor/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed workers
        id: set-matrix
        run: |
          WORKERS='[
            {"dir":"json-toolkit-mcp","name":"json-toolkit-mcp"},
            {"dir":"regex-engine-mcp","name":"regex-engine-mcp"},
            {"dir":"color-palette-mcp","name":"color-palette-mcp"},
            {"dir":"timestamp-converter-mcp","name":"timestamp-converter-mcp"},
            {"dir":"prompt-enhancer-mcp","name":"prompt-enhancer-mcp"},
            {"dir":"agentforge-compare-mcp","name":"agentforge-compare-mcp"},
            {"dir":"moltbook-publisher-mcp","name":"moltbook-publisher-mcp"},
            {"dir":"fortune-mcp","name":"openclaw-fortune-mcp"},
            {"dir":"fortune-api","name":"fortune-api"},
            {"dir":"openclaw-intel-mcp","name":"openclaw-intel-mcp"},
            {"dir":"openclaw-intel-api","name":"openclaw-intel-api"},
            {"dir":"product-store","name":"product-store"},
            {"dir":"fleet-gateway","name":"fleet-gateway"},
            {"dir":"zilliz-bridge","name":"zilliz-bridge"},
            {"dir":"yedan-graph-rag","name":"yedan-graph-rag"},
            {"dir":"github-models-proxy","name":"github-models-proxy"},
            {"dir":"xai-proxy","name":"xai-proxy"},
            {"dir":"yedan-orchestrator","name":"yedan-orchestrator"},
            {"dir":"yedan-cloud-executor","name":"yedan-cloud-executor"},
            {"dir":"yedan-intel-ops","name":"yedan-intel-ops"},
            {"dir":"yedan-health-commander","name":"yedan-health-commander"},
            {"dir":"yedan-content-engine","name":"yedan-content-engine"},
            {"dir":"yedan-revenue-sentinel","name":"yedan-revenue-sentinel"},
            {"dir":"openclaw-do","name":"openclaw-do"},
            {"dir":"openclaw-workflows","name":"openclaw-workflows"},
            {"dir":"openclaw-browser","name":"openclaw-browser"},
            {"dir":"antigravity-lb","name":"antigravity-lb"},
            {"dir":"groq-lb","name":"groq-lb"},
            {"dir":"google-policy-monitor","name":"google-policy-monitor"}
          ]'

          # For workflow_dispatch, deploy all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "matrix={\"include\":$(echo $WORKERS | jq -c .)}" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For push, only deploy changed workers
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          MATRIX_ITEMS="[]"

          for row in $(echo $WORKERS | jq -c '.[]'); do
            dir=$(echo $row | jq -r '.dir')
            if echo "$CHANGED" | grep -q "^${dir}/"; then
              MATRIX_ITEMS=$(echo $MATRIX_ITEMS | jq -c ". + [$row]")
            fi
          done

          if [ "$MATRIX_ITEMS" = "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":$(echo $MATRIX_ITEMS | jq -c .)}" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.name }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.dir }}
          command: deploy

      - name: Post-deploy health check
        run: |
          echo "Checking health of ${{ matrix.name }}..."
          WORKER_URL="https://${{ matrix.name }}.yagami8095.workers.dev"

          # Wait for deployment propagation
          sleep 5

          # Health check with retry (3 attempts)
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${WORKER_URL}/health" 2>/dev/null || echo "000")

            # Any HTTP response = alive (even 404/405 means Worker is running)
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ ${{ matrix.name }} is alive (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "Attempt $i: ${{ matrix.name }} returned $HTTP_CODE, retrying..."
            sleep 3
          done

          echo "⚠️ ${{ matrix.name }} health check failed after 3 attempts"
          # Don't fail the job — Worker may not have a /health endpoint
          exit 0

  # Notify fleet-gateway after all deploys complete
  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify fleet-gateway
        run: |
          curl -s -X POST "https://fleet-gateway.yagami8095.workers.dev/v1/memory/save" \
            -H "Authorization: Bearer ${{ secrets.FLEET_GATEWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"items\": [{
                \"id\": \"deploy-$(date +%s)\",
                \"name\": \"GitHub Deploy: ${{ github.sha }}\",
                \"type\": \"deploy_event\",
                \"summary\": \"Deployed via GitHub Actions. Commit: ${{ github.event.head_commit.message }}. Status: ${{ needs.deploy.result }}\"
              }]
            }" || true
          echo "Deploy notification sent to fleet-gateway"
