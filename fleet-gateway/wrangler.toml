name = "fleet-gateway"
main = "worker.js"
compatibility_date = "2024-12-01"

[vars]
FLEET_VERSION = "2.1.0"
# AB_EMBED_COHERE disabled — Vectorize index is 768d, Cohere models output 1024d minimum
# To enable: recreate Vectorize index at 1024d, then uncomment
# AB_EMBED_COHERE = "true"

# Cron: auto-save fleet state to memory every 5 minutes (overclocked)
[triggers]
crons = ["*/5 * * * *"]

# Workers AI binding via AI Gateway (caching, fallback, cost tracking)
[ai]
binding = "AI"
gateway = { id = "default" }

# D1 database (shared with fleet)
[[d1_databases]]
binding = "DB"
database_name = "yedan-army-command"
database_id = "48fa9025-84ba-448a-9993-1d88e37f0a5c"

# Vectorize index (shared with KG Worker)
[[vectorize]]
binding = "VECTORIZE"
index_name = "openclaw-kg-vectors"

# KV for rate limiting and state
[[kv_namespaces]]
binding = "KV"
id = "51826cd6550a40e79a61d462b084a1c8"

# ── Service Bindings (Worker-to-Worker, zero HTTP overhead) ──
[[services]]
binding = "GRAPH_RAG"
service = "yedan-graph-rag"

[[services]]
binding = "ORCHESTRATOR"
service = "yedan-orchestrator"

[[services]]
binding = "CLOUD_EXECUTOR"
service = "yedan-cloud-executor"

[[services]]
binding = "INTEL_OPS"
service = "yedan-intel-ops"

[[services]]
binding = "HEALTH_COMMANDER"
service = "yedan-health-commander"

[[services]]
binding = "ZILLIZ_BRIDGE"
service = "zilliz-bridge"

[[services]]
binding = "GROQ_LB"
service = "groq-lb"

# ── Hyperdrive (accelerated Neon Postgres connection pooling + caching) ──
[[hyperdrive]]
binding = "NEON"
id = "feba7c9b43df49958732dde24f15bbb9"

# ── Queue (reliable async task dispatch) ──
# Create via: npx wrangler queues create openclaw-task-queue
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "openclaw-task-queue"
