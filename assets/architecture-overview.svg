<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0a0a0a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">OpenClaw MCP Servers -- Architecture Overview</text>
  <rect x="30" y="160" width="120" height="80" rx="10" fill="#1a1a2e" stroke="#ff6b35" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="195" text-anchor="middle" fill="#ff6b35" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">User</text>
  <text x="90" y="218" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="11">Developer</text>
  <line x1="150" y1="200" x2="195" y2="200" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="200" y="150" width="130" height="100" rx="10" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="190" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Claude</text>
  <text x="265" y="210" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">or Cursor</text>
  <text x="265" y="235" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="10">AI Assistant</text>
  <line x1="330" y1="200" x2="375" y2="200" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="353" y="190" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">MCP</text>
  <rect x="380" y="130" width="140" height="140" rx="10" fill="#1a1a2e" stroke="#f7b731" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="170" text-anchor="middle" fill="#f7b731" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Cloudflare</text>
  <text x="450" y="190" text-anchor="middle" fill="#f7b731" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Edge</text>
  <text x="450" y="215" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="10">300+ PoPs</text>
  <text x="450" y="232" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="10">Global CDN</text>
  <text x="450" y="255" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">&lt;50ms latency</text>
  <line x1="520" y1="200" x2="565" y2="200" stroke="#f7b731" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="570" y="60" width="210" height="280" rx="10" fill="#111122" stroke="#ff6b35" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="85" text-anchor="middle" fill="#ff6b35" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">9 MCP Servers</text>
  <text x="585" y="112" fill="#4ecdc4" font-family="monospace" font-size="10">1. json-toolkit</text>
  <text x="585" y="132" fill="#4ecdc4" font-family="monospace" font-size="10">2. regex-engine</text>
  <text x="585" y="152" fill="#4ecdc4" font-family="monospace" font-size="10">3. color-palette</text>
  <text x="585" y="172" fill="#4ecdc4" font-family="monospace" font-size="10">4. timestamp-converter</text>
  <text x="585" y="192" fill="#4ecdc4" font-family="monospace" font-size="10">5. prompt-enhancer</text>
  <text x="585" y="212" fill="#4ecdc4" font-family="monospace" font-size="10">6. openclaw-intel</text>
  <text x="585" y="232" fill="#4ecdc4" font-family="monospace" font-size="10">7. openclaw-fortune</text>
  <text x="585" y="252" fill="#4ecdc4" font-family="monospace" font-size="10">8. moltbook-publisher</text>
  <text x="585" y="272" fill="#4ecdc4" font-family="monospace" font-size="10">9. agentforge-compare</text>
  <text x="675" y="318" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="10">49 tools total</text>
  <text x="400" y="380" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">All servers run as Cloudflare Workers -- zero cold starts, global edge deployment</text>
</svg>
