<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a0a" rx="12"/>
  <text x="300" y="30" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Get Started in 3 Steps</text>
  <circle cx="100" cy="100" r="35" fill="#1a1a2e" stroke="#ff6b35" stroke-width="2.5"/>
  <text x="100" y="95" text-anchor="middle" fill="#ff6b35" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">1</text>
  <text x="100" y="112" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">Choose</text>
  <text x="100" y="155" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11">Pick a Server</text>
  <text x="100" y="172" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">9 available</text>
  <line x1="140" y1="100" x2="260" y2="100" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="255,95 265,100 255,105" fill="#ff6b35"/>
  <circle cx="300" cy="100" r="35" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="2.5"/>
  <text x="300" y="95" text-anchor="middle" fill="#4ecdc4" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">2</text>
  <text x="300" y="112" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">Configure</text>
  <text x="300" y="155" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11">Paste URL</text>
  <text x="300" y="172" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">No API key needed</text>
  <line x1="340" y1="100" x2="460" y2="100" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="455,95 465,100 455,105" fill="#4ecdc4"/>
  <circle cx="500" cy="100" r="35" fill="#1a1a2e" stroke="#f7b731" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" fill="#f7b731" font-family="system-ui, sans-serif" font-size="22" font-weight="bold">3</text>
  <text x="500" y="112" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">Done!</text>
  <text x="500" y="155" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11">Start Using</text>
  <text x="500" y="172" text-anchor="middle" fill="#a0a0a0" font-family="system-ui, sans-serif" font-size="9">Ask your AI assistant</text>
</svg>
